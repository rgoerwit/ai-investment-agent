version: '3.8'

services:
  investment-agent:
    build:
      context: .
      dockerfile: Dockerfile
    image: investment-agent:latest
    container_name: investment-agent

    # Environment variables from .env file
    env_file:
      - .env

    # Or specify environment variables directly
    environment:
      # Model selection overrides the repo defaults in src/config.py
      # Set QUICK_MODEL / DEEP_MODEL here if you want different runtime defaults

      # Logging
      - LOG_LEVEL=${LOG_LEVEL:-INFO}
      - STRUCTURED_LOGGING=true

      # ChromaDB
      - ANONYMIZED_TELEMETRY=False
      - CHROMA_PERSIST_DIRECTORY=/app/chroma_db
      - CHROMA_PERSIST_DIR=/app/chroma_db
      - RESULTS_DIR=/app/results
      - DATA_CACHE_DIR=/app/data_cache
      - IMAGES_DIR=/app/images

      # LangSmith (optional)
      - LANGSMITH_TRACING=${LANGSMITH_TRACING:-false}

      # Silence gRPC warnings (macOS)
      - GRPC_VERBOSITY=ERROR
      - GRPC_TRACE=

    # Local bind mounts so container mode and manual mode share the same state
    volumes:
      - ./results:/app/results
      - ./chroma_db:/app/chroma_db
      - ./data_cache:/app/data_cache
      - ./images:/app/images
      - ./scratch:/app/scratch

    # Resource limits
    deploy:
      resources:
        limits:
          cpus: '2.0'
          memory: 4G
        reservations:
          cpus: '1.0'
          memory: 2G

    # Command override (examples)
    # Uncomment one of these or override at runtime
    # command: ["--ticker", "AAPL", "--quick"]
    # command: ["--ticker", "NVDA"]
    # command: ["--ticker", "TSLA", "--quick"]

    # Network for potential observability stack
    networks:
      - agent-network

  # ──────────────────────────────────────────────────────────────────────────
  # OPTIONAL: Prometheus - Metrics collection (commented out, not configured)
  # ──────────────────────────────────────────────────────────────────────────
  # Uncomment and configure monitoring/prometheus.yml to enable
  #
  # prometheus:
  #   image: prom/prometheus:latest
  #   container_name: investment-agent-prometheus
  #   volumes:
  #     - ./monitoring/prometheus.yml:/etc/prometheus/prometheus.yml:ro
  #     - prometheus-data:/prometheus
  #   ports:
  #     - "9090:9090"
  #   restart: unless-stopped
  #   networks:
  #     - agent-network

  # ──────────────────────────────────────────────────────────────────────────
  # OPTIONAL: Grafana - Observability dashboards (commented out, not configured)
  # ──────────────────────────────────────────────────────────────────────────
  # Uncomment and configure monitoring/grafana/ to enable
  #
  # grafana:
  #   image: grafana/grafana:latest
  #   container_name: investment-agent-grafana
  #   environment:
  #     - GF_SECURITY_ADMIN_PASSWORD=${GRAFANA_PASSWORD:-admin}
  #   volumes:
  #     - grafana-data:/var/lib/grafana
  #   ports:
  #     - "3000:3000"
  #   restart: unless-stopped
  #   networks:
  #     - agent-network
  #   depends_on:
  #     - prometheus

networks:
  agent-network:
    driver: bridge
